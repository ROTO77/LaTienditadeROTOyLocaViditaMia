<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Tindita de ROTO y Loca Vidita Mia/title>
    <style>
        /* Fondo Negro y estilo sobrio */
        body { 
            background-color: #000000; 
            color: #ffffff; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            padding: 0; 
        }

        header { 
            padding: 60px 20px; 
            text-align: center; 
            border-bottom: 1px solid #333; 
        }

        h1 { 
            color: #FF00FF; /* Fucsia en el título */
            font-size: 2.8rem; 
            text-transform: uppercase; 
            letter-spacing: 4px; 
            margin: 0;
            font-weight: 300; /* Letra más fina y elegante */
        }

        p.subtitle {
            color: #FFFF00; /* Amarillo para el subtítulo */
            letter-spacing: 2px;
            font-size: 0.9rem;
            margin-top: 10px;
        }

        .container { 
            max-width: 1100px; 
            margin: 40px auto; 
            padding: 20px;
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 40px; 
        }

        /* Tarjetas estilo Galería */
        .card { 
            background: #111; /* Negro ligeramente más claro para la tarjeta */
            border: 1px solid #222; 
            border-radius: 4px; /* Bordes menos redondeados para más sobriedad */
            overflow: hidden; 
            transition: 0.4s;
        }

        .card:hover { 
            border-color: #FF00FF; /* Brillo fucsia al pasar el mouse */
            transform: translateY(-10px);
        }

        .card img { 
            width: 100%; 
            height: 350px; /* Fotos grandes pero controladas */
            object-fit: cover; 
            filter: grayscale(20%); /* Un toque sobrio que se quita al pasar el mouse */
            transition: 0.4s;
        }

        .card:hover img {
            filter: grayscale(0%);
        }

        .info { 
            padding: 25px; 
            text-align: center; 
        }

        .info h3 { 
            font-size: 1.4rem; 
            margin: 0; 
            color: #ffffff; 
            font-weight: 400;
        }

        .price { 
            font-size: 1.6rem; 
            font-weight: bold; 
            color: #FFFF00; /* Amarillo para el precio, resalta mucho en negro */
            margin: 15px 0;
        }

        /* Botón Verde Neón */
        .btn-whatsapp { 
            display: inline-block; 
            background-color: #00FF00; 
            color: #000; 
            text-decoration: none; 
            padding: 12px 30px; 
            border-radius: 2px; 
            font-weight: bold; 
            font-size: 0.9rem;
            text-transform: uppercase; 
            transition: 0.3s;
        }

        .btn-whatsapp:hover { 
            background-color: #ccff00; /* Cambia a un verde amarillento */
            box-shadow: 0 0 15px #00FF00; /* Efecto neón */
        }
    </style>
</head>
<body>

<header>
    <h1>MI NOMBRE O MARCA</h1>
    <p class="subtitle">ARTE • ILUSTRACIÓN • DISEÑO</p>
</header>

<div class="container">

    <div class="card">
        <img src="roto1.jpg" alt="Obra 1">
        <div class="info">
            <h3>Cuaderno A5</h3>
            <div class="price">$ 29.990-</div>
            <a href="https://wa.me/5491130688712?text=Hola! Me interesa esta pieza" class="btn-whatsapp" target="_blank">Consultar</a>
        </div>
    </div>

    <div class="card">
        <img src="roto2.jpg" alt="Obra 2">
        <div class="info">
            <h3></h3>Cuaderno A5</h3>
            <div class="price">$ 29.990-</div>
            <a href="https://wa.me/5491130688712?text=Hola! Me interesa esta pieza" class="btn-whatsapp" target="_blank">Consultar</a>
        </div>
    </div>

</div>

</body>
</html>
