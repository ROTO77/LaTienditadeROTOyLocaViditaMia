<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El lado ROTO de la Luna</title>
    <style>
    /* Una paleta suave, artesanal y vintage */
    body { 
        font-family: 'Verdana', sans-serif; 
        background-color: #FF00FF; /* fucsia */
        color: #4a5d4e; /* Verde oscuro para el texto, más suave que el negro */
        margin: 0; 
        padding: 0; 
    }

    header { 
        background-color: #8B8589; /* gris topo */
        padding: 50px 20px; 
        text-align: center; 
        border-bottom: 3px solid #d4efdf; /* Detalle en verde pastel */
    }

    h1 { 
        color: #FF00FF; /* fucsia */
        margin: 0; 
        font-size: 2.8em;
        text-shadow: 1px 1px 2px rgba(0,0,0,0.05); /* Toque sutil */
    }

    p { font-style: italic; color: #aeb6bf; }

    .galeria { 
        display: grid; 
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
        gap: 25px; 
        padding: 40px; 
    }

    .tarjeta { 
        background: #ffffff; 
        border-radius: 8px; /* Bordes menos redondeados para un look más de papel */
        overflow: hidden; 
        box-shadow: 5px 5px 15px rgba(0,0,0,0.02); 
        border: 1px solid #f2f4f4;
        text-align: center; 
        padding-bottom: 25px; 
    }

    .tarjeta img { 
        width: 100%; 
        height: 300px; 
        object-fit: cover; 
        border-bottom: 1px solid #f2f4f4;
    }

    .tarjeta h3 { color: #5dade2; margin: 20px 0 10px; }

    .precio { 
        color: #52be80; /* Verde para el precio */
        font-weight: bold; 
        font-size: 1.3em; 
        display: block; 
        margin-bottom: 20px; 
    }

    .btn-whatsapp { 
        background-color: #a9dfbf; /* Verde pastel para el botón */
        color: #ffffff; 
        text-decoration: none; 
        padding: 12px 25px; 
        border-radius: 4px; 
        font-weight: bold; 
        display: inline-block;
        transition: background 0.3s;
    }

    .btn-whatsapp:hover {
        background-color: #7dcea0; /* Se oscurece un poquito al pasar el mouse */
    }
</style>
</head>
<body>

<header>
    <h1>La ROTO tienda</h1>
    <p>Cuadernos de tapa dura con ilustraciones originales</p>
</header>

<section class="galeria">
    <div class="tarjeta">
        <img src="https://via.placeholder.com/300" alt="Cuaderno Ilustrado">
        <h3>Cuaderno A5 - Diseño Botánico</h3>
        <span class="precio">$12.000</span>
        <a href="https://wa.me/TU_TELEFONO?text=Hola! Quiero el cuaderno botánico" class="btn-whatsapp">Consultar por WhatsApp</a>
    </div>

    <div class="tarjeta">
        <img src="https://via.placeholder.com/300" alt="Cuaderno Personalizado">
        <h3>Cuaderno A5 - Arte Vintage</h3>
        <span class="precio">$12.000</span>
        <a href="https://wa.me/TU_TELEFONO?text=Hola! Quiero el cuaderno vintage" class="btn-whatsapp">Consultar por WhatsApp</a>
    </div>
</section>

</body>
</html>
