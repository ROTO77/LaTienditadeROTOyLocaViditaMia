 



  <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Artesanal</title>
    <style>
        /* Base de color Gris Topo y estética limpia */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; 
            background-color: #f6f8fa; /* Fondo gris muy claro tipo GitHub */
            color: #8B8589; /* Texto principal en Gris Topo */
            margin: 0; 
            padding: 20px; 
        }

        h1 { 
            text-align: center; 
            color: #FF00FF; /* Título en Fucsia vibrante */
            font-size: 2.5rem;
            margin-bottom: 40px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .container { 
            max-width: 1100px; 
            margin: 0 auto; 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 25px; 
        }

        /* Tarjeta de producto */
        .card { 
            background: white; 
            border: 2px solid #40E0D0; /* Borde en Turquesa */
            border-radius: 12px; 
            overflow: hidden; 
            transition: transform 0.3s, box-shadow 0.3s;
            display: flex;
            flex-direction: column;
        }

        .card:hover { 
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(139, 133, 137, 0.3); /* Sombra color Topo */
            border-color: #FF00FF; /* Cambia a Fucsia al pasar el mouse */
        }

        .card img { 
            width: 100%; 
            height: 250px; 
            object-fit: cover; 
            border-bottom: 2px solid #40E0D0; 
        }

        .info { 
            padding: 20px; 
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        h3 { 
            margin: 0 0 10px 0; 
            color: #24292f; 
            font-size: 1.4rem;
        }

        .price { 
            font-size: 1.5rem; 
            font-weight: bold; 
            color: #8B8589; /* Precio en Gris Topo para balancear */
            margin-bottom: 15px;
        }

        /* Botón comprar en VERDE FUERTE */
        .btn-whatsapp { 
            display: block; 
            text-align: center; 
            background-color: #00FF00; /* Verde puro/fuerte */
            color: #000; /* Texto negro para máximo contraste */
            text-decoration: none; 
            padding: 12px; 
            border-radius: 8px; 
            font-weight: 800; 
            text-transform: uppercase;
            transition: 0.3s;
            border: none;
        }

        .btn-whatsapp:hover { 
            background-color: #00CC00; 
            transform: scale(1.02);
        }

        /* Detalle decorativo en Turquesa */
        .badge {
            background-color: #40E0D0;
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            display: inline-block;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<h1>Mis Cuadernos y Láminas</h1>

<div class="container">
    
    <div class="card">
        <img src="URL_DE_TU_IMAGEN_AQUI" alt="Producto 1">
        <div class="info">
            <div>
                <span class="badge">Original</span>
                <h3>Cuaderno Artesanal</h3>
                <p>Tapa dura, diseño único hecho a mano con texturas reales.</p>
            </div>
            <div class="price">$12.500</div>
            <a href="https://wa.me/TUNUMEROAQUI?text=Hola!%20Me%20interesa%20el%20Cuaderno%20Artesanal" class="btn-whatsapp" target="_blank">Comprar por WhatsApp</a>
        </div>
    </div>

    <div class="card">
        <img src="URL_DE_TU_IMAGEN_AQUI" alt="Producto 2">
        <div class="info">
            <div>
                <span class="badge">Lámina</span>
                <h3>Lámina 15x21cm</h3>
                <p>Impresión de alta calidad, trazos nítidos de lápiz y marcador.</p>
            </div>
            <div class="price">$4.800</div>
            <a href="https://wa.me/TUNUMEROAQUI?text=Hola!%20Me%20interesa%20la%20Lamina%2015x21" class="btn-whatsapp" target="_blank">Comprar por WhatsApp</a>
        </div>
    </div>

</div>

</body>
</html>
