<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cuadernos | La Tiendita de ROTO</title>
    <style>
        /* ESTILOS BASE */
        body { 
            font-family: sans-serif; 
            background-color: #000; 
            color: white; 
            margin: 0; 
            padding: 10px; 
        }
        
        /* MENÚ LATERAL */
        .sidenav {
            height: 100%; width: 0; position: fixed; z-index: 1000;
            top: 0; left: 0; background-color: #111; overflow-x: hidden;
            transition: 0.5s; padding-top: 60px;
        }
        .sidenav a {
            padding: 10px 30px; text-decoration: none; font-size: 20px;
            color: #ff00ff; display: block; transition: 0.3s;
        }
        .sidenav a:hover { color: #fdfd96; }

        .btn-menu {
            font-size: 18px; cursor: pointer; background-color: #ff00ff;
            color: white; padding: 10px 15px; border: none; border-radius: 5px;
            margin-bottom: 20px;
        }

        /* DISEÑO DE LA GALERÍA ADAPTABLE */
        .galeria {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
        }

        .tarjeta {
            background-color: #1a1a1a;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 15px;
            width: 280px; /* Ancho para computadoras */
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .tarjeta img {
            width: 100%;
            border-radius: 5px;
            height: 250px;
            object-fit: cover;
        }

        .tarjeta h3 { font-size: 14px; margin: 10px 0; color: #fdfd96; min-height: 45px; }
        .precio { display: block; font-size: 18px; font-weight: bold; margin-bottom: 10px; color: #ff00ff; }

        .btn-whatsapp {
            display: block;
            background-color: #25d366;
            color: white;
            text-decoration: none;
            padding: 10px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 14px;
        }

        .sin-stock { background-color: #555 !important; }

        /* AJUSTES PARA CELULARES */
        @media screen and (max-width: 600px) {
            .tarjeta {
                width: 44%; /* Entran dos por fila en el celu */
                padding: 8px;
            }
            .tarjeta img {
                height: 160px; /* Fotos más chicas para que no ocupen toda la pantalla */
            }
            .tarjeta h3 { font-size: 11px; min-height: 35px; }
            .precio { font-size: 15px; }
            .btn-whatsapp { font-size: 11px; padding: 8px 2px; }
            h1 { font-size: 22px; text-align: center; }
        }
    </style>
</head>
<body>

    <div id="menuLateral" class="sidenav">
        <a href="javascript:void(0)" onclick="abrirCerrar()" style="font-size: 30px;">&times; Cerrar</a>
        <a href="index.html">Inicio</a>
        <a href="Cuadernos.html">Cuadernos</a>
        <a href="LocaViditaMiaArtesanías.html">Artesanías</a>
        <a href="ImanesDark.html">Imanes Dark</a>
        <a href="Sobremi.html">Sobre mí</a>
    </div>

    <button class="btn-menu" onclick="abrirCerrar()">☰ Categorías</button>

    <h1>Mis Cuadernos</h1>

    <section class="galeria">
        <!-- Ejemplo de un cuaderno (Repite este bloque para cada uno) -->
        <div class="tarjeta"> 
            <img src="roto15.jpg" alt="Producto">
            <h3>Cuaderno A5 ROTO raiz - Tapa semi rígida</h3>
            <span class="precio">$ 13.000-</span>
            <a href="https://wa.me/5491130688712?text=Hola! Me interesa el Cuaderno A5 ROTO raiz" class="btn-whatsapp">COMPRAR</a>
        </div>

        <div class="tarjeta"> 
            <img src="roto16.jpg" alt="Producto">
            <h3>Cuaderno A5 ROTO verde - Tapa semi rígida</h3>
            <span class="precio">$ 13.000-</span>
            <a href="https://wa.me/5491130688712?text=Hola! Me interesa el Cuaderno A5 verde" class="btn-whatsapp">COMPRAR</a>
        </div>
        
        <!-- Agrega aquí el resto de tus cuadernos usando el mismo formato de <div class="tarjeta"> -->

    </section>

    <script>
        function abrirCerrar() {
            var menu = document.getElementById("menuLateral");
            if (menu.style.width === "250px") {
                menu.style.width = "0";
            } else {
                menu.style.width = "250px";
            }
        }
    </script>
</body>
</html>
