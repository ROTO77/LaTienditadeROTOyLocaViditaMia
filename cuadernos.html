        body { font-family: sans-serif; background-color: #000; color: white; margin: 0; padding: 20px; }
        
        .sidenav {

            top: 0; left: 0; background-color: #111; overflow-x: hidden;
            transition: 0.5s; padding-top: 60px;
        }

        .sidenav a {
            padding: 10px 30px; text-decoration: none; font-size: 22px;
            color: #ff00ff; display: block; transition: 0.3s;
        }

        .sidenav a:hover { color: #fdfd96; }

        .btn-menu {
            font-size: 20px; cursor: pointer; background-color: #ff00ff;
            color: white; padding: 10px 15px; border: none; border-radius: 5px;
        }
    </style>
</head>
